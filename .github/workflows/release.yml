name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            suffix: linux-amd64
            use_cross: false
            ext: ""
            archive: tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            suffix: linux-aarch64
            use_cross: true
            ext: ""
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: darwin-amd64
            use_cross: false
            ext: ""
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: darwin-aarch64
            use_cross: false
            ext: ""
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: windows-amd64
            use_cross: false
            ext: ".exe"
            archive: tar.gz
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            suffix: windows-aarch64
            use_cross: false
            ext: ".exe"
            archive: tar.gz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'linux-musl') && !matrix.use_cross
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install Cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build Release Binaries
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p bifrost -p bifrost-server
          else
            cargo build --release --target ${{ matrix.target }} -p bifrost -p bifrost-server
          fi

      - name: Prepare binaries
        shell: bash
        run: |
          mkdir -p release
          # Extract version from tag (remove 'v' prefix if present)
          VERSION="${GITHUB_REF#refs/tags/}"
          cp target/${{ matrix.target }}/release/bifrost${{ matrix.ext }} release/bifrost-${{ matrix.suffix }}${{ matrix.ext }}
          cp target/${{ matrix.target }}/release/bifrost-server${{ matrix.ext }} release/bifrost-server-${{ matrix.suffix }}${{ matrix.ext }}

      - name: Create archive
        shell: bash
        working-directory: release
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          tar czf bifrost-${VERSION}-${{ matrix.suffix }}.tar.gz bifrost-${{ matrix.suffix }}${{ matrix.ext }} bifrost-server-${{ matrix.suffix }}${{ matrix.ext }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
