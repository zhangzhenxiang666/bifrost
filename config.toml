# =============================================================================
# Bifrost Server Configuration
# =============================================================================

[server]
port = 5564  # 服务器监听端口
proxy = "http://127.0.0.1:8080"  # HTTP 代理地址
timeout_secs = 600  # HTTP 请求超时时间（秒）
max_retries = 5  # HTTP 请求失败最大重试次数
retry_backoff_base_ms = 700  # 指数回避基础延迟（毫秒）

# =============================================================================
# Provider 配置
# =============================================================================

[provider.openai-example]
base_url = "https://api.openai.com/v1"  # 服务提供商的 API 地址
api_key = "sk-your-key"  # API 密钥
endpoint = "openai"  # 端点类型，支持 "openai" 或 "anthropic"
# Provider 级别的额外请求头（会添加到所有请求）
headers = [
    { name = "X-Provider-Header", value = "provider-value" },
    { name = "X-Custom-Config", value = "some-config" }
]
# Provider 级别的额外请求体字段（会合并到请求体中）
body = [
    { name = "extra_field", value = "extra_value" },
    { name = "debug_mode", value = true }
]

[provider.anthropic]
base_url = "https://api.anthropic.com/v1"
api_key = "your-key"
endpoint = "anthropic"
exclude_headers = ["X-Custom-Header"]  # 排除的请求头（仅影响原始请求 headers）
extend = true  # 是否继承原始请求的 headers（默认 false，不继承）
# 请求体转换策略：丢弃所有未处理的字段（适合 Anthropic 不接受 unknown field 的场景）
body_policy = "drop_unknown"
# Provider 级别的额外请求头
headers = [
    { name = "X-Anthropic-Provider", value = "bifrost-gateway" }
]
# Provider 级别的额外请求体字段
body = [
    { name = "provider_extra", value = "test" }
]
# 模型特定配置
[[provider.anthropic.models]]
name = "claude-sonnet-4-20250514"  # 模型名称
# 该模型的额外请求头（优先级高于 Provider 级别）
headers = [
    { name = "X-Model-Header", value = "sonnet-model" }
]
# 该模型的额外请求体字段（会与 Provider 级别合并）
body = [
    { name = "model_extra", value = "sonnet-extra" }
]

[[provider.anthropic.models]]
name = "claude-opus-4-20250514"  # 另一个模型配置
headers = [
    { name = "X-Model-Header", value = "opus-model" }
]

# Alias 配置 - 模型名称映射
# =============================================================================
# 可以配置简短模型名称到 "provider@model" 格式的映射
# 这样客户端无需记忆完整的 provider 前缀，只需使用简短名称即可路由到对应模型
# 优先级：provider@model 格式 > alias > 报错
[alias]
"sonnet" = "openai-example@gpt-4o"

# 复杂映射：包含 target（必填）、headers（可选）、body（可选）
[alias."claude-sonnet"]
target = "openai@claude-sonnet-4-20250514"

[[alias."claude-sonnet".headers]]
name = "X-Custom-Header"
value = "custom-value"

[[alias."claude-sonnet".body]]
name = "enable_thinking"
value = false

[alias."claude-opus"]
target = "anthropic@claude-opus-4-20250514"

[[alias."claude-opus".headers]]
name = "X-Require-Auth"
value = "true"