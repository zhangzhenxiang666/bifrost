[package]
name = "llm-map"
version = "0.1.0"
edition = "2021"

[dependencies]
axum = "0.8.8"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.49.0", features = ["full"] }

# Async traits
async-trait = "0.1"

# HTTP client
reqwest = { version = "0.12", features = ["json", "stream"] }

# Error handling
thiserror = "2.0"
anyhow = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "time", "chrono"] }

# Middleware
tower-http = { version = "0.6", features = ["cors", "trace"] }
# Utilities
futures = "0.3"
http = "1.0"
serde_yaml = "0.9"
tokio-stream = "0.1"


# TOML support
toml = "0.8"

# Testing
tempfile = "3"
